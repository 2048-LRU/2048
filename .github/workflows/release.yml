name: Release

on:
    push:
        tags:
            - 'v*'

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build Signed Release APK
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17

            - name: Decode keystore
              run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Build signed release APK
              env:
                  KEYSTORE_FILE: keystore.jks
                  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                  KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
                  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
              run: ./gradlew assembleRelease

            - name: Verify APK signature
              run: $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner verify --print-certs app/build/outputs/apk/release/*.apk

            - name: Clean up keystore
              if: always()
              run: rm -f app/keystore.jks

            - name: Upload release APK
              uses: actions/upload-artifact@v4
              with:
                  name: PersonalJournal
                  path: app/build/outputs/apk/release/*.apk

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  name: 2048 ${{ github.ref_name }}
                  generate_release_notes: true
                  files: app/build/outputs/apk/release/*.apk
